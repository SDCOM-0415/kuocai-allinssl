name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Read version
      id: read_version
      run: |
        VERSION=$(cat ver.txt | tr -d '\r\n ' )
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Build release binaries
      run: |
        cd kuocai
        GOOS=linux GOARCH=amd64 go build -o kuocai-linux-amd64 .
        GOOS=linux GOARCH=arm64 go build -o kuocai-linux-arm64 .
        GOOS=linux GOARCH=arm GOARM=7 go build -o kuocai-linux-armv7 .
        GOOS=windows GOARCH=amd64 go build -o kuocai-windows-amd64.exe .
        chmod +x kuocai-linux-amd64 kuocai-linux-arm64 kuocai-linux-armv7

    - name: Build debug binaries
      run: |
        cd kuocai
        GOOS=linux GOARCH=amd64 go build -ldflags "-X main.debugMode=true" -o kuocai-linux-amd64-debug .
        GOOS=linux GOARCH=arm64 go build -ldflags "-X main.debugMode=true" -o kuocai-linux-arm64-debug .
        GOOS=linux GOARCH=arm GOARM=7 go build -ldflags "-X main.debugMode=true" -o kuocai-linux-armv7-debug .
        GOOS=windows GOARCH=amd64 go build -ldflags "-X main.debugMode=true" -o kuocai-windows-amd64-debug.exe .
        chmod +x kuocai-linux-amd64-debug kuocai-linux-arm64-debug kuocai-linux-armv7-debug

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.read_version.outputs.VERSION }}
        name: ${{ steps.read_version.outputs.VERSION }}
        body: |
          括彩CDN SSL证书部署插件，支持所有基于括彩CDN系统的平台

          ## 平台对应说明

          | 文件 | 适用平台 | 说明 |
          |------|----------|------|
          | `kuocai-linux-amd64` | Linux x86_64 | 适用于大多数 Linux 服务器（Intel/AMD 64位） |
          | `kuocai-linux-arm64` | Linux ARM64 | 适用于 ARM64 架构设备（如树莓派4/5、群晖ARM64、Oracle Cloud ARM） |
          | `kuocai-linux-armv7` | Linux ARMv7 | 适用于 32位 ARM 设备（如树莓派2/3、旧款ARM路由器/NAS） |
          | `kuocai-windows-amd64.exe` | Windows x86_64 | 适用于 Windows 64位系统 |

          ## Debug 版本（用于排查问题，任务日志会输出详细信息）

          | 文件 | 适用平台 |
          |------|----------|
          | `kuocai-linux-amd64-debug` | Linux x86_64 |
          | `kuocai-linux-arm64-debug` | Linux ARM64 |
          | `kuocai-linux-armv7-debug` | Linux ARMv7 |
          | `kuocai-windows-amd64-debug.exe` | Windows x86_64 |
        artifacts: |
          kuocai/kuocai-linux-amd64
          kuocai/kuocai-linux-arm64
          kuocai/kuocai-linux-armv7
          kuocai/kuocai-windows-amd64.exe
          kuocai/kuocai-linux-amd64-debug
          kuocai/kuocai-linux-arm64-debug
          kuocai/kuocai-linux-armv7-debug
          kuocai/kuocai-windows-amd64-debug.exe
        generateReleaseNotes: true
        skipIfReleaseExists: true
        token: ${{ secrets.GITHUB_TOKEN }}
