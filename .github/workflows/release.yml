name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Read version
      id: read_version
      run: |
        VERSION=$(cat ver.txt | tr -d '\n')
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Build for Linux amd64
      run: |
        cd kuocai
        GOOS=linux GOARCH=amd64 go build -o kuocai-linux-amd64 .
        chmod +x kuocai-linux-amd64

    - name: Build for Linux arm64
      run: |
        cd kuocai
        GOOS=linux GOARCH=arm64 go build -o kuocai-linux-arm64 .
        chmod +x kuocai-linux-arm64

    - name: Build for Linux armv7
      run: |
        cd kuocai
        GOOS=linux GOARCH=arm GOARM=7 go build -o kuocai-linux-armv7 .
        chmod +x kuocai-linux-armv7

    - name: Build for Windows amd64
      run: |
        cd kuocai
        GOOS=windows GOARCH=amd64 go build -o kuocai-windows-amd64.exe .
        chmod +x kuocai-windows-amd64.exe

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kuocai-builds
        path: |
          kuocai/kuocai-linux-amd64
          kuocai/kuocai-linux-arm64
          kuocai/kuocai-linux-armv7
          kuocai/kuocai-windows-amd64.exe

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.read_version.outputs.VERSION }}
        name: ${{ steps.read_version.outputs.VERSION }}
        body: |
          括彩CDN SSL证书部署插件，支持所有基于括彩CDN系统的平台

          ## 平台对应说明

          | 文件 | 适用平台 | 说明 |
          |------|----------|------|
          | `kuocai-linux-amd64` | Linux x86_64 | 适用于大多数 Linux 服务器（Intel/AMD 64位） |
          | `kuocai-linux-arm64` | Linux ARM64 | 适用于 ARM64 架构设备（如树莓派4/5、群晖ARM64、Oracle Cloud ARM） |
          | `kuocai-linux-armv7` | Linux ARMv7 | 适用于 32位 ARM 设备（如树莓派2/3、旧款ARM路由器/NAS） |
          | `kuocai-windows-amd64.exe` | Windows x86_64 | 适用于 Windows 64位系统 |
        artifacts: |
          kuocai/kuocai-linux-amd64
          kuocai/kuocai-linux-arm64
          kuocai/kuocai-linux-armv7
          kuocai/kuocai-windows-amd64.exe
        generateReleaseNotes: true
        skipIfReleaseExists: true
        token: ${{ secrets.GITHUB_TOKEN }}
